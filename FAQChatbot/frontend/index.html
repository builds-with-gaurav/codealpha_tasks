<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Support FAQ Bot</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="chat-app">
    <header class="chat-header">
      <div class="avatar">FB</div>
      <div>
        <h1>Support FAQ Bot</h1>
        <p class="status"><span class="dot"></span> Online · usually replies instantly</p>
      </div>
    </header>

    <main id="messages" class="messages">
      <!-- messages get injected here -->
    </main>

    <div class="suggestions" id="suggestions">
      <button class="chip">How long does delivery take?</button>
      <button class="chip">What is your return policy?</button>
      <button class="chip">Do you offer cash on delivery?</button>
      <button class="chip">How do I reset my password?</button>
    </div>

    <form id="chatForm" class="chat-input">
      <input id="userInput" type="text" autocomplete="off"
             placeholder="Type your question..." />
      <button type="submit" aria-label="Send">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
        </svg>
      </button>
    </form>
  </div>

  <script src="app.js"></script>
</body>
</html>
