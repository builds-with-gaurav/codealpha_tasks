<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LinguaShift — AI Language Translation Tool</title>
  <script
    src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.0/dist/index.global.js"
    integrity="sha384-nWTzRTCY/9V4Bo352ehygr1c4cnst4XN6lMR3fipakEQrhVpc0hEM5Dii3Amz0sT"
    crossorigin="anonymous"
  ></script>
  <style type="text/tailwindcss">
    @custom-variant dark (&:where(.dark, .dark *));
  </style>
  <script>
    document.documentElement.classList.toggle(
      'dark',
      window.matchMedia('(prefers-color-scheme: dark)').matches
    );
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-dvh bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 text-sm antialiased">
  <div class="mx-auto w-full max-w-5xl px-4 py-6 sm:py-10">

    <!-- Header -->
    <header class="mb-6 flex items-center justify-between gap-3">
      <div class="flex items-center gap-3">
        <div class="flex h-11 w-11 items-center justify-center rounded-xl bg-indigo-600 text-white shadow-lg shadow-indigo-600/20">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/></svg>
        </div>
        <div>
          <h1 class="text-lg font-bold tracking-tight sm:text-xl">LinguaShift</h1>
          <p class="text-xs text-slate-500 dark:text-slate-400">AI Language Translation Tool · CodeAlpha</p>
        </div>
      </div>
      <span class="hidden rounded-full bg-emerald-100 px-3 py-1 text-xs font-medium text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300 sm:inline">100+ languages</span>
    </header>

    <!-- Language selector bar -->
    <div class="mb-3 grid grid-cols-1 items-center gap-2 sm:grid-cols-[1fr_auto_1fr]">
      <div>
        <label class="mb-1 block text-xs font-medium text-slate-500 dark:text-slate-400">From</label>
        <select id="sourceLang" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-sm shadow-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/30 dark:border-slate-700 dark:bg-slate-900"></select>
      </div>
      <button id="swapBtn" title="Swap languages" class="mx-auto mt-0 flex h-10 w-10 items-center justify-center self-end rounded-lg border border-slate-300 bg-white text-slate-600 transition hover:bg-slate-100 hover:text-indigo-600 active:scale-95 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-300 dark:hover:bg-slate-800">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m4 6H4m0 0l4 4m-4-4l4-4"/></svg>
      </button>
      <div>
        <label class="mb-1 block text-xs font-medium text-slate-500 dark:text-slate-400">To</label>
        <select id="targetLang" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-sm shadow-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/30 dark:border-slate-700 dark:bg-slate-900"></select>
      </div>
    </div>

    <!-- Text panels -->
    <div class="grid grid-cols-1 gap-3 md:grid-cols-2">
      <!-- Source -->
      <div class="flex flex-col rounded-xl border border-slate-200 bg-white shadow-sm dark:border-slate-800 dark:bg-slate-900">
        <textarea id="sourceText" rows="6" maxlength="5000" placeholder="Type or paste text to translate…"
          class="w-full flex-1 resize-none rounded-t-xl bg-transparent p-4 text-base outline-none placeholder:text-slate-400"></textarea>
        <div class="flex items-center justify-between border-t border-slate-100 px-3 py-2 dark:border-slate-800">
          <span id="charCount" class="text-xs text-slate-400">0 / 5000</span>
          <div class="flex items-center gap-1">
            <button id="speakSource" title="Listen" class="icon-btn"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072M17.95 6.05a8 8 0 010 11.9M11 5L6 9H2v6h4l5 4V5z"/></svg></button>
            <button id="clearBtn" title="Clear" class="icon-btn"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
          </div>
        </div>
      </div>

      <!-- Target -->
      <div class="flex flex-col rounded-xl border border-slate-200 bg-white shadow-sm dark:border-slate-800 dark:bg-slate-900">
        <div id="targetText" class="relative min-h-[9rem] w-full flex-1 whitespace-pre-wrap rounded-t-xl p-4 text-base text-slate-800 dark:text-slate-100">
          <span id="placeholder" class="text-slate-400">Translation will appear here…</span>
        </div>
        <div class="flex items-center justify-between border-t border-slate-100 px-3 py-2 dark:border-slate-800">
          <span id="detectedNote" class="text-xs text-slate-400"></span>
          <div class="flex items-center gap-1">
            <button id="speakTarget" title="Listen" class="icon-btn"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072M17.95 6.05a8 8 0 010 11.9M11 5L6 9H2v6h4l5 4V5z"/></svg></button>
            <button id="copyBtn" title="Copy" class="icon-btn"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg></button>
          </div>
        </div>
      </div>
    </div>

    <!-- Action row -->
    <div class="mt-4 flex flex-col items-center gap-3 sm:flex-row sm:justify-between">
      <label class="flex cursor-pointer items-center gap-2 text-xs text-slate-500 dark:text-slate-400">
        <input id="autoTranslate" type="checkbox" class="h-4 w-4 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500">
        Auto-translate as I type
      </label>
      <button id="translateBtn" class="flex w-full items-center justify-center gap-2 rounded-lg bg-indigo-600 px-6 py-3 text-sm font-semibold text-white shadow-lg shadow-indigo-600/25 transition hover:bg-indigo-700 active:scale-[0.98] disabled:cursor-not-allowed disabled:opacity-60 sm:w-auto">
        <span id="btnLabel">Translate</span>
        <svg id="btnSpinner" class="hidden h-4 w-4 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
      </button>
    </div>

    <p id="errorMsg" class="mt-3 hidden rounded-lg bg-red-50 px-4 py-2 text-sm text-red-600 dark:bg-red-900/30 dark:text-red-300"></p>

    <footer class="mt-10 text-center text-xs text-slate-400">
      Built for CodeAlpha AI Internship · Task 1 · Powered by the MyMemory Translation API
    </footer>

    <!-- Toast -->
    <div id="toast" class="pointer-events-none fixed bottom-6 left-1/2 -translate-x-1/2 translate-y-4 rounded-lg bg-slate-900 px-4 py-2 text-sm font-medium text-white opacity-0 shadow-xl transition-all dark:bg-slate-100 dark:text-slate-900"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
